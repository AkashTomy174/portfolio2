<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family: system-ui, sans-serif;
        color: #f8fafc;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 40px 36px;
        width: 100%;
        max-width: 360px;
      }
      h1 { margin: 0 0 6px; font-size: 1.25rem; }
      .subtitle { color: #64748b; font-size: 0.85rem; margin: 0 0 28px; }
      label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 6px; }
      input[type="password"] {
        width: 100%;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #f8fafc;
        font-size: 0.95rem;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="password"]:focus { border-color: #3b82f6; }
      button {
        margin-top: 18px;
        width: 100%;
        background: #2563eb;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 11px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #1d4ed8; }
      .error {
        margin-top: 14px;
        background: #450a0a;
        border: 1px solid #7f1d1d;
        border-radius: 8px;
        color: #fca5a5;
        font-size: 0.85rem;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Admin Login</h1>
      <p class="subtitle">AI Akash backend dashboard</p>
      <form method="post" action="/admin/login">
        <label for="token">Access token</label>
        <input
          id="token"
          name="token"
          type="password"
          placeholder="Enter admin token"
          autocomplete="current-password"
          autofocus
          required
        />
        <button type="submit">Sign in</button>
      </form>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </div>
  </body>
</html>
