name: Deploy Backend to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "=== Deploying backend to EC2 ==="
            echo "Debug: $(date)"
            echo "Debug: whoami=$(whoami)"
            echo "Debug: pwd=$(pwd)"
            echo "Debug: HOME=$HOME"
            uname -a
            id
            env | sort | grep -E 'HOME|USER|SHELL|PATH|GIT|PYTHON|VIRTUAL' || true
            command -v git || true
            git --version || true
            command -v python3 || true
            python3 --version || true
            command -v python || true
            python --version || true
            if [ -d "$HOME/portfolio2" ]; then
              echo "Removing stale repository checkout."
              rm -rf "$HOME/portfolio2"
            fi
            echo "Cloning repository fresh."
            git clone https://github.com/AkashTomy174/portfolio2.git "$HOME/portfolio2"
            cd "$HOME/portfolio2"
            git checkout main
            git pull origin main
            cd backend
            ls -la
            echo "Removing stale virtual environment if present."
            rm -rf .venv
            python3 -m venv .venv
            source .venv/bin/activate
            python3 -m pip install --upgrade pip setuptools wheel
            python3 -m pip install --no-cache-dir -r requirements.txt
            if sudo systemctl list-unit-files ai-akash.service >/dev/null 2>&1; then
              echo "Restarting ai-akash service."
              sudo systemctl daemon-reload || true
              sudo systemctl restart ai-akash
              sudo systemctl status ai-akash --no-pager
            else
              echo "ERROR: ai-akash systemd service was not found on the target host."
              sudo systemctl list-unit-files --all | grep -i ai-akash || true
              exit 1
            fi
