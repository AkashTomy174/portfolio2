name: Deploy Backend to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "=== Deploying backend to EC2 ==="
            echo "Debug: $(date)"
            echo "Debug: whoami=$(whoami)"
            echo "Debug: pwd=$(pwd)"
            echo "Debug: HOME=$HOME"
            uname -a
            id
            env | sort | grep -E 'HOME|USER|SHELL|PATH|GIT|PYTHON|VIRTUAL' || true
            command -v git || true
            git --version || true
            command -v python3 || true
            python3 --version || true
            command -v python || true
            python --version || true
            if [ ! -d "$HOME/portfolio2" ]; then
              echo "Repository not found at $HOME/portfolio2, cloning fresh copy."
              git clone https://github.com/AkashTomy174/portfolio2.git "$HOME/portfolio2"
            fi
            cd "$HOME/portfolio2"
            git fetch origin main
            git reset --hard origin/main
            cd backend
            ls -la
            if [ ! -d .venv ]; then
              echo "Creating backend virtual environment."
              if command -v python3 >/dev/null 2>&1; then
                python3 -m venv .venv
              else
                python -m venv .venv
              fi
            fi
            source .venv/bin/activate
            if command -v pip >/dev/null 2>&1; then
              pip install -r requirements.txt --quiet
            else
              python -m pip install -r requirements.txt --quiet
            fi
            if sudo systemctl list-unit-files ai-akash.service >/dev/null 2>&1; then
              echo "Restarting ai-akash service."
              sudo systemctl daemon-reload || true
              sudo systemctl restart ai-akash
              sudo systemctl status ai-akash --no-pager
            else
              echo "ERROR: ai-akash systemd service was not found on the target host."
              sudo systemctl list-unit-files --all | grep -i ai-akash || true
              exit 1
            fi
